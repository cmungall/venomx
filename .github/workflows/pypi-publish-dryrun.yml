name: Dry Run Publish Python Package (No communication with pypi)

on:
  workflow_dispatch:
  release:
    types: [created]
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-n-publish:
    name: Build and publish Python 🐍 distributions 📦 to PyPI
    runs-on: ubuntu-
    strategy:
      matrix:
        python-version: [ "3.10", "3.11", "3.12", "3.13", "3.14" ]

    # needs: [test]
    environment: release
    #environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7.6.0

      - name: Git url.
        run: |
          echo "$(git config --get remote.origin.url)"
      - name: Git describe.
        run: |
          echo "$(git describe)"

      - name: Test tags.
        run: |
          echo "$(git describe --tags)"

      - name: Test tags again.
        run: |
          echo "$(git tag --list)"

      - name: Install dependencies.
        run: |
          uv sync --extra docs

      - name: Build source and wheel archives
        run: uv build

#      - name: Publish
#        uses: pypa/gh-action-pypi-publish@v1.13.0
